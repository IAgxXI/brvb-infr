<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRVB – Organizacinė struktūra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #ede8dc; }
    #chart { display: block; width: 100%; height: 100%; }
    .link { fill: none; stroke: #4a2c6e; stroke-width: 1.5px; }
    .node { cursor: grab; }
    .node:active { cursor: grabbing; }
    .node text {
      font-family: 'Segoe UI', Arial, sans-serif;
      fill: #fff;
      pointer-events: none;
      user-select: none;
    }
    #controls {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    #controls button {
      background: #4a2c6e;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font: 12px 'Segoe UI', Arial, sans-serif;
      cursor: pointer;
      opacity: 0.85;
      box-shadow: 0 2px 4px rgba(0,0,0,.25);
    }
    #controls button:hover { opacity: 1; background: #2c6e40; }
    #hint {
      position: fixed;
      bottom: 14px;
      right: 14px;
      font: 11px 'Segoe UI', Arial, sans-serif;
      color: #aaa;
      pointer-events: none;
    }
  </style>
</head>
<body>

<svg id="chart"></svg>

<div id="controls">
  <button id="btnReset">&#8635; Reset positions</button>
  <button id="btnFit">&#8862; Fit to screen</button>
</div>

<div id="hint">Scroll — zoom &nbsp;|&nbsp; Drag canvas — pan &nbsp;|&nbsp; Drag box — move independently</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="./tree.js"></script>
</body>
</html>
