<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRVB – Organizacinė struktūra</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    #chart { display: block; width: 100%; height: 100%; }
    .link { fill: none; stroke: #4a2c6e; stroke-width: 1.5px; }
    .node { cursor: grab; }
    .node:active { cursor: grabbing; }
    .node text {
      font-family: 'Segoe UI', Arial, sans-serif;
      fill: #fff;
      pointer-events: none;
      user-select: none;
    }
    #controls {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    #controls button {
      background: #4a2c6e;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 6px 14px;
      font: 12px 'Segoe UI', Arial, sans-serif;
      cursor: pointer;
      opacity: 0.85;
      box-shadow: 0 2px 4px rgba(0,0,0,.25);
    }
    #controls button:hover { opacity: 1; background: #2c6e40; }
    #hint {
      position: fixed;
      bottom: 14px;
      right: 14px;
      font: 11px 'Segoe UI', Arial, sans-serif;
      color: #aaa;
      pointer-events: none;
    }
    @media print {
      @page { size: A4 portrait; margin: 8mm; }
      *, *::before, *::after { margin: 0; padding: 0; }
      html, body {
        width: 194mm;
        height: 281mm;
        overflow: hidden;
        background: #fff;
      }
      body { display: block; page-break-after: avoid; }
      #controls { display: none !important; }
      #hint { display: none !important; }
      .patvirt {
        position: static !important;
        display: block;
        right: auto !important;
        left: auto !important;
        width: auto;
        max-width: 72mm;
        margin: 0 0 4mm auto;
        text-align: left;
        page-break-inside: avoid;
      }
      .spacer { display: none; }
      #chart {
        width: 100%;
        height: 248mm;
        display: block;
        page-break-inside: avoid;
        page-break-after: avoid;
      }
    }
  </style>
  <style> 
	.patvirt {
		display: block;
		position: absolute;
		top: 0px;
		right: calc(40px);
		z-index: 1;
		width: 267px;
	}
	.spacer {
		height: 0px;
	}
	</style>
</head>
<body>
<p class="patvirt">PATVIRTINTA </br>
	Biržų rajono savivaldybės Jurgio Bielinio</br>
	viešosios bibliotekos direktoriaus</br>
	2026 m. kovo 26 d. įsakymu Nr. V1-49</p>
<div class="spacer"></div>
<svg id="chart"></svg>

<div id="controls">
  <button id="btnReset">&#8635; Reset positions</button>
  <button id="btnFit">&#8862; Fit to screen</button>
</div>

<div id="hint">Drag canvas — pan &nbsp;|&nbsp; Drag box — move independently<span id="zoomHint"></span></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="./tree.js"></script>
</body>
</html>
